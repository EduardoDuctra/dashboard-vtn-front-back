<div class="container">
  <table mat-table [dataSource]="eventosFuturos" class="demo-table">
    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Tipo de solicitação</th>
      <td mat-cell *matCellDef="let e">
        {{ e.type === 'inject' ? 'Despacho' : 'Redução' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="value">
      <th mat-header-cell *matHeaderCellDef>Potência (kW)</th>
      <td mat-cell *matCellDef="let e">
        {{ e.value }}
      </td>
    </ng-container>

    <ng-container matColumnDef="startTime">
      <th mat-header-cell *matHeaderCellDef>Data inicial</th>
      <td mat-cell *matCellDef="let e">
        {{ e.startTime | date: 'dd/MM/yyyy HH:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="endTime">
      <th mat-header-cell *matHeaderCellDef>Data final</th>
      <td mat-cell *matCellDef="let e">
        {{ e.endTime | date: 'dd/MM/yyyy HH:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="deletar">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let e">
        <button mat-icon-button color="warn" (click)="deletar(e.apiId)">
          <mat-icon class="material-symbols-outlined">delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
